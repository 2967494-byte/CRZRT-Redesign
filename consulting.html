<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Консалтинг | CRZRT</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-color);
        }

        .consulting-article {
            margin-bottom: 100px;
            scroll-margin-top: 140px;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            color: var(--text-primary);
            line-height: 1.1;
        }

        .author-box {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 24px 12px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
            flex-shrink: 0;
        }

        .author-box:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .author-box:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        .authors-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 20px;
            margin-bottom: 40px;
            overflow-x: auto;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .authors-row::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        .author-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            background: #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: #8e8e93;
            font-weight: 600;
        }

        .author-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-right: 10px;
        }

        .author-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-primary);
        }

        .author-contacts {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-weight: 500;
        }

        .author-contacts a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }

        .author-contacts a:hover {
            color: var(--accent-color);
        }

        .highlight-summary {
            font-size: 1.6rem;
            color: var(--text-primary);
            font-weight: 500;
            padding: 0;
            margin-bottom: 40px;
            line-height: 1.4;
            letter-spacing: -0.01em;
            position: relative;
        }

        .highlight-summary::before {
            content: "“";
            color: var(--accent-color);
            font-size: 3.5rem;
            line-height: 0;
            vertical-align: bottom;
            margin-right: 10px;
            opacity: 0.8;
            font-family: Georgia, serif;
        }

        .service-benefits {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 45px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .service-benefits:hover {
            transform: translateY(-4px);
        }

        .service-benefits h4 {
            margin-bottom: 25px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .service-benefits ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 16px;
        }

        .service-benefits li {
            position: relative;
            padding-left: 36px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-size: 1.05rem;
        }

        .service-benefits li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(41, 151, 255, 0.15);
        }

        .service-disclaimer {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.8;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--card-border);
            line-height: 1.4;
        }

        .consulting-sidebar {
            flex: 0 0 280px;
            position: sticky;
            top: 120px;
            padding: 30px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .consulting-sidebar h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .consulting-nav-list a {
            display: block;
            padding: 10px 15px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .consulting-nav-list a:hover {
            background: rgba(80, 80, 80, 0.2);
            color: var(--text-primary);
        }

        @media (max-width: 900px) {
            .consulting-layout {
                flex-direction: column;
            }

            .consulting-sidebar {
                flex: none;
                position: static;
                margin-bottom: 40px;
            }
        }

        .page-header {
            text-align: center;
        }

        .hero-title {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-primary), #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        [data-theme="light"] .hero-title {
            background: linear-gradient(135deg, #1d1d1f, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.3;
            letter-spacing: -0.01em;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <div id="global-header"></div>
    <script src="header.js"></script>

    <main>
        <section class="page-header" style="padding: 140px 0 60px;">
            <div class="container">
                <h1 class="hero-title">Консалтинг</h1>
                <p class="hero-subtitle">Профессиональная юридическая поддержка для бизнеса и специалистов по закупкам.
                </p>
            </div>
        </section>

        <section class="consulting-content">
            <div class="container consulting-layout"
                style="display: flex; gap: 40px; align-items: flex-start; max-width: 1200px;">

                <aside class="consulting-sidebar">
                    <nav class="consulting-nav-list" id="consultingPageNav">
                        <!-- Ссылки сгенерируются динамически -->
                    </nav>
                </aside>

                <!-- Dynamic content generation -->
                <div id="consultingDynContainer" style="flex: 1; max-width: 800px;"></div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-col">
                <h4>Центр развития закупок</h4>
                <p>© 2026 Центр развития закупок РТ.</p>
            </div>
            <div class="footer-col">
                <h4>Контакты</h4>
                <p>E-mail: info@crzrt.ru</p>
                <p>Тел: +7 (000) 000-00-00</p>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const defaultConsultingData = {
                authors: [
                    { id: '1', avatarText: 'Д', name: 'Дмитрий', phone: '+7 900 000-00-00', email: 'dima@crzrt.ru' },
                    { id: '2', avatarText: 'ИИ', name: 'Иванов И.И.', phone: '+7 900 000-00-01', email: 'ivanov@crzrt.ru' }
                ],
                services: [
                    { id: 'business', title: 'Решения для бизнеса', highlight: 'Юридические решения – это не расходы, а защита ваших денег и времени.', benefits: 'анализ бизнес-модели на предмет потенциальных рисков: исков, штрафов, претензий\nшаблоны рабочих документов: договоры, приказы, положение о закупках (223-ФЗ)\nпрактические советы и стратегии минимизации негативных последствий', disclaimer: '' },
                    { id: 'deals', title: 'Сопровождение сделок', highlight: 'Сопровождение сделки абсолютно необходимо для минимизации рисков и безопасности всех сторон.', benefits: 'Правовую экспертизу объектов перед сделкой\nподготовка полного и юридически выверенного пакета документов\nорганизацию безопасных расчетов между контрагентами\nсопровождение сделки и проверку «чистоты» подписания', disclaimer: '' },
                    { id: 'disputes', title: 'Сложные судебные споры', highlight: 'Суд - крайняя стадия конфликтной ситуации, и к ней нужно быть готовым заранее.', benefits: 'правовой аудит ситуации и досудебную подготовку (медиация)\nформирование железной доказательной базы и процессуальных документов\nпредставительство ваших интересов в судах всех инстанций\nсопровождение на этапе исполнительного производства', disclaimer: '' },
                    { id: 'corporate', title: 'Корпоративное право', highlight: 'В процессе деятельности любое юридическое лицо руководствуется прежде всего нормами корпоративного права, и их исполнение лучше доверить профессионалам.', benefits: 'Система «под ключ»: регистрация, ликвидация или реорганизация юридических лиц, в том числе унитарных предприятий\nподготовка решений и протоколов собраний\nдетальная правовая экспертиза и структурирование сделок\nразработка и внедрение корпоративных договоров и опционных программ для сотрудников', disclaimer: '' },
                    { id: 'public', title: 'Поддержка госзаказчиков', highlight: 'Поможем понять структуры работы с 44-ФЗ и госзакупками в целом, снять излишние риски с должностных лиц.', benefits: 'правовая экспертиза закупочной документации еще на стадии планирования\nкомплексное сопровождение заключения и исполнения контракта\nпретензионно-исковая работа и взыскание неустоек\nзащита при проверках контролирующих органов и обжалование решений, предписаний, постановлений КоАП\nметодологическое обеспечение закупочной деятельности (положения, регламенты)', disclaimer: '' },
                    { id: 'competitor', title: 'Конкурентный консалтинг', highlight: 'Работа с поставщиками – одно из наших приоритетных направлений. Постоянные изменения в законодательстве требуют всегда быть в курсе новых судебных практик.', benefits: 'анализ закупочной документации и проверка «подводных камней».\nпрактические рекомендации и оценка возможностей участия в торгах\nПодготовка и тщательная проверка заявки на участие (решения об одобрении сделки, отсутствие оснований для отклонения)\nсопровождение «антимонопольного этапа» и подача запросов на разъяснение (жалобы, представление интересов)\nЮридическая поддержка при исполнении контракта\nзащита интересов при спорах о включении в РНП*', disclaimer: '* Реестр недобросовестных поставщиков (ст. 104 Закона о контрактной системе 44-ФЗ)' }
                ]
            };

            const data = JSON.parse(localStorage.getItem('crzrt_consulting_data')) || defaultConsultingData;
            const container = document.getElementById('consultingDynContainer');
            const pageNav = document.getElementById('consultingPageNav');

            if (!container) return;

            // Generate HTML for authors block
            let authorsHTML = `<div class="authors-row">`;
            data.authors.forEach(author => {
                if (author.name.trim() === '') return; // Skip empty
                authorsHTML += `
                    <div class="author-box">
                        <div class="author-avatar" style="${author.avatarUrl ? 'background: url(' + author.avatarUrl + ') center/cover; color: transparent;' : ''}">${author.avatarUrl ? '' : (author.avatarText || '👤')}</div>
                        <div class="author-info">
                            <span class="author-name">${author.name}</span>
                            <div class="author-contacts">
                                ${author.phone ? `<a href="tel:${author.phone}">📞 ${author.phone}</a>` : ''}
                                ${author.email ? `<a href="mailto:${author.email}">✉️ ${author.email}</a>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            authorsHTML += `</div>`;

            // Render Services AND populate Page Nav
            if (pageNav) pageNav.innerHTML = '';

            data.services.forEach(service => {
                // ADD to Page Nav
                if (pageNav) {
                    const navLink = document.createElement('a');
                    navLink.href = `#${service.id}`;
                    navLink.innerText = service.title;
                    pageNav.appendChild(navLink);
                }

                const article = document.createElement('article');
                article.id = service.id;
                article.className = 'consulting-article';

                // Format benefits string into <li> collection
                const listItems = service.benefits
                    .split('\\n')
                    .map(item => item.trim())
                    .filter(item => item.length > 0)
                    .map(item => {
                        // Remove leading dashes logically if user put them
                        if (item.startsWith('-')) item = item.substring(1).trim();
                        // Capitalize first letter
                        if (item.length > 0) item = item.charAt(0).toUpperCase() + item.slice(1);
                        return `<li>${item}</li>`;
                    })
                    .join('');

                let htmlContent = `
                    <h2 class="section-title">${service.title}</h2>
                    ${authorsHTML}
                `;

                if (service.highlight) {
                    htmlContent += `
                        <div class="highlight-summary">
                            ${service.highlight}
                        </div>
                    `;
                }

                htmlContent += `
                    <div class="service-benefits">
                        <h4>Что именно вы получите:</h4>
                        <ul>
                            ${listItems}
                        </ul>
                        ${service.disclaimer ? `<div class="service-disclaimer">${service.disclaimer}</div>` : ''}
                    </div>
                `;

                article.innerHTML = htmlContent;
                container.appendChild(article);
            });
        });
    </script>

</body>

</html>
